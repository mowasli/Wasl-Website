<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WASL - Building Meaningful Connections</title>
  <style>
    :root {
      --bg-dark: #070711;
      --text-main: #f5f5f7;
      --text-soft: #cfcfe7;
      --purple: #7b5cff;
      --pink: #ff5db1;
      --blue: #6ecbff;
      --green: #4de2b1;
      --card-bg: rgba(10, 12, 30, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --transition-speed: 0.8s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Background with overlay and GitHub-linked image */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
      background:
        linear-gradient(rgba(7, 7, 17, 0.75), rgba(7, 7, 17, 0.85)),
        url("background.png") center center / cover no-repeat fixed,
        var(--bg-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Animations --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      width: 100%;
      margin-bottom: 60px;
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .logo-wrap img {
      max-height: 60px;
      width: auto;
      display: block;
      /* Using local/github path as requested */
      content: url("logo.png"); 
    }

    .hero {
      display: flex;
      align-items: center;
      flex: 1;
    }

    .hero-content {
      max-width: 850px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      animation: fadeInUp 1s ease-out both;
    }

    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 28px;
      animation: fadeInUp 1s ease-out 0.2s both;
    }

    .rainbow-text {
      background: linear-gradient(
        90deg,
        var(--blue),
        var(--green),
        var(--purple),
        var(--pink),
        var(--blue)
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradientFlow 5s linear infinite;
    }

    .hero p {
      max-width: 680px;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      line-height: 1.6;
      color: var(--text-soft);
      margin-bottom: 45px;
      animation: fadeInUp 1s ease-out 0.4s both;
    }

    .cta-container {
      animation: fadeInUp 1s ease-out 0.6s both;
    }

    .cta-card {
      display: inline-flex;
      padding: 12px;
      border-radius: 30px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(15px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .cta-card:hover {
        transform: scale(1.02);
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      border-radius: 20px;
      padding: 20px 40px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, var(--purple), #9d85ff);
      box-shadow: 0 10px 20px rgba(123, 92, 255, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .cta-btn::after {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transition: 0.5s;
    }

    .cta-btn:hover::after {
        left: 100%;
    }

    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(123, 92, 255, 0.5);
    }

    .footer-note {
      margin-top: 30px;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.05em;
    }

    /* Responsiveness */
    @media (max-width: 768px) {
      .hero h1 { font-size: 3rem; }
      .cta-card, .cta-btn { width: 100%; justify-content: center; }
      .hero-content { text-align: center; }
      .topbar { display: flex; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="page">
    <header class="topbar">
      <div class="logo-wrap">
        <img src="logo.png" alt="WASL" />
      </div>
    </header>

    <main class="hero">
      <div class="hero-content">
        <span class="eyebrow">Launching 2026</span>

        <h1>
          Building 
          <span class="rainbow-text">meaningful connections</span> 
          for founders.
        </h1>

        <p>
          WASL is dedicated to building meaningful connections that unlock 
          opportunities for founders in underserved and emerging ecosystems.
        </p>

        <div class="cta-container">
            <div class="cta-card">
              <a class="cta-btn" href="https://jisr-by-wasl.framer.website/contact-us?utm_source=website&utm_medium=landing_page&utm_campaign=coming_soon" target="_blank" rel="noopener noreferrer">
                Join Our Support System
              </a>
            </div>
            <div class="footer-note">
              We’re getting ready to launch.
            </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
