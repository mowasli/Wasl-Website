<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oops! - WASL</title>
  <style>
    :root {
      --bg-dark: #070711;
      --text-main: #f5f5f7;
      --purple: #7b5cff;
      --pink: #ff5db1;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin: 0;
      overflow: hidden;
    }

    /* Floating background blur for effect */
    .blob {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--purple);
      filter: blur(100px);
      opacity: 0.2;
      z-index: -1;
      animation: move 10s infinite alternate;
    }

    @keyframes move {
      from { transform: translate(-50%, -50%); }
      to { transform: translate(50%, 50%); }
    }

    .error-container {
      padding: 40px;
      max-width: 600px;
    }

    h1 {
      font-size: 8rem;
      margin: 0;
      background: linear-gradient(to bottom, #fff, var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    h2 {
      font-size: 1.5rem;
      color: var(--pink);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #cfcfe7;
      margin-bottom: 40px;
    }

    .back-home {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      padding: 15px 35px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.05);
    }

    .back-home:hover {
      background: #fff;
      color: var(--bg-dark);
      transform: translateY(-3px);
    }

    .countdown-text {
        margin-top: 20px;
        font-size: 0.9rem;
        opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  
  <div class="error-container">
    <h2>Error 404</h2>
    <h1>Patience!</h1>
    <p>
      We know you can't wait to see the full website... <br>
      Trust us, <strong>we can't wait either!</strong> <br>
      But we're still polishing the pixels. We'll be launching very, very soon.
    </p>

    <a href="index.html" class="back-home">Take me back to safety</a>
    
    <div class="countdown-text">Redirecting you home in <span id="timer">10</span>s...</div>
  </div>

  <script>
    // Automatically redirect home after 10 seconds
    let seconds = 10;
    const display = document.getElementById('timer');
    
    setInterval(() => {
      seconds--;
      display.innerText = seconds;
      if (seconds <= 0) {
        window.location.href = "index.html";
      }
    }, 1000);
  </script>
</body>
</html>
